<!DOCTYPE html>
<html>
    <head>
        <title>
            flexbox practice
        </title>
    </head>
    <body style="padding-bottom: 1000px;">
        <div style="
            display: flex;
            ">
            <div style="background-color: lightblue; width: 200px;">200px</div>
            <div style="background-color: lightpink; width: 75px;">75px</div>
        </div>
        <div style="
            margin-top: 20px;
            display: flex;
            ">
            <div style="background-color: lightblue; width: 50px;">item1</div>
            <div style="background-color: lightpink; flex: 1;">item2</div>
            <div style="background-color: lightblue; width: 75px;">item3</div>
        </div>
        <div style="
            margin-top: 20px;
            display: flex;
            border-width: 1px;
            border-style: solid;
            border-color: grey;
            justify-content: space-between;
            ">
            <div style="background-color: lightblue;">item1</div>
            <div style="background-color: lightpink;">item2</div>
            <div style="background-color: lightblue;">item3</div>
            <div style="background-color: lightpink;">item4</div>
        </div>
        <div style="
            display: flex;
            margin-top: 20px;
            border-width: 1px;
            border-style: solid;
            height: 70px;
            justify-content: space-between;
            align-items: center;
            ">
            <div style="background-color: lightblue;">item1</div>
            <div style="background-color: lightpink;">item2</div>
        </div>
        <div style="
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 35px;
        background-color: rgb(162, 94, 226);
        ">
            <div style="color: white; 
            font-family: Arial;
            margin-left: 8px;
            font-size: 12px;
            ">Home</div>
            <div><input type="text" placeholder="Search" style="border: none; width: 400px; border-radius: 10px;"></div>
            <div><button style="background-color: rgb(162, 94, 226); 
            color: white; 
            border-color: white; 
            border-radius: 2px;
            margin-right: 4px;
            ">Download</button></div>
        </div>
    </body>
</html>
