<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>buttons exercise</title>
        <style>
            p{
                margin-right: 0;
                margin-left: 0;
            }
            .subscribe-button{
                background-color: rgb(180, 6, 6);
                color: white;
                border: none;
                border-radius: 2px;
                margin-right: 8px;
                margin-left: 10px;
                padding-right: 16px;
                padding-left: 16px;
                padding-top: 10px;
                padding-bottom: 10px;
                transition: opacity 0.15s;
                vertical-align: top;
                cursor: pointer;
            }
            .subscribe-button:hover{
                opacity: 0.85;
            }
            .subscribe-button:active{
                opacity: 0.5;
            }
            .join-button{
                background-color: white;
                color: rgb(6, 95, 212);
                border-color: rgb(6, 95, 212);
                border-width: 1px;
                border-style: solid;
                border-radius: 2px;
                padding-right: 16px;
                padding-left: 16px;
                padding-top: 9px;
                padding-bottom: 9px;
                margin-right: 10px;
                transition: background-color 0.15s, color 0.15s;
                cursor: pointer;
            }
            .join-button:hover{
                color: white;
                background-color: rgb(6, 95, 212);
            }
            .join-button:active{
                opacity: 0.7;
            }
            .tweet-button{
                color: white;
                background-color: rgb(29, 155, 240);
                border: none;
                font-weight: bold;
                font-size: 15px;
                border-radius: 18px;
                padding-right: 16px;
                padding-left: 16px;
                padding-top: 9px;
                padding-bottom: 9px;
                transition: box-shadow 0.15s;
                cursor: pointer;
            }
            .tweet-button:hover{
                box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
                
            }
            .tweet-button:active{
                opacity: 0.5;
            }
        </style>
    </head>
    <body>
        <button class="subscribe-button">SUBSCRIBE</button>
        <button class="join-button">JOIN</button>
        <button class="tweet-button">Tweet</button>
    </body>
</html>
