<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Learning buttons</title>
        <style>
            .Request-now-button{
                background-color: black;
                border: none;
                color: white;
                height: 40px;
                width: 120px;
            }
            .Cart-button{
                background-color: rgb(243, 205, 14);
                height: 40px;
                width: 150px;
                border-radius: 20px;
                border: none;
            }
            .signup-button{
                background-color: rgb(46,164,79);
                color: white;
                font-size: 15px;
                height: 40px;
                border-radius: 16px;
                width: 100px;
                border: none;
            }
            .getstarted-button{
                background-color: rgb(121, 82, 179);
                height: 40px;
                width: 120px;
                border-radius: 6px;
                border: none;
            }
            .download-button{
                background-color: white;
                width: 120px;
                height: 40px;
                color: rgba(0,0,0,0.65);
                border-color: rgba(0,0,0,0.65);
            }
        </style>
    </head>
    <body>
        <button class = "Request-now-button">
            Request now
        </button>
        <button class = "Cart-button">
            Add to Cart
        </button>
        <button class = "signup-button">
            Sign up
        </button>
        <button class = "getstarted-button">
            Get Started
        </button>
        <button class = "download-button">
            Download
        </button>
    </body>
</html>
