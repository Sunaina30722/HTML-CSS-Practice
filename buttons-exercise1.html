<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Save button, Uber Request now button</title>
    <style>
      .request-now-button{
        color: white;
        background-color: black;
        height: 40px;
        width: 130px;
        border: none;
        transition: opacity 0.15s;
      }
      .request-now-button:hover{
        opacity: 0.85;
      }
      .save-button{
        background-color: white;
        color: blue;
        height: 40px;
        width: 90px;
        border-width: 1px;
        border-color: blue;
        border-radius: 20px;
        transition: border-width 0.15s;
      }
      .save-button:hover{
        border-width: 2px;
      }
    </style>
</head>
<body>
   <button class="save-button">Save</button>
  <button class="request-now-button">Request now</button>
</body>
</html>
